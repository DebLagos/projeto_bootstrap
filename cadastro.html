<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exames</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="componentes.css">

    <link rel="stylesheet" href="icon/icofont.min.css">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet" />
</head>

<body>

    <main class="container d-flex flex-column justify-content-center align-items-center">

        <div class="d-flex justify-content-center">
            <img class="w-25 mt-4 mb-4" src="imagens/logo-tipograh.png" alt="">
        </div>

        <div class="card w-50 p-4 border-0">
            <div class="card-body text-center">
                <form action="">
                    <h4 class="text-start mb-4">Cadastre-se</h4>
                    <p class="text-start small"> </p>

                    <div class="form-group mb-4">
                        <input class="form-control" type="text" name="" id="" placeholder="Digite seu nome">
                    </div>
                    <div class="form-group mb-4">
                        <input class="form-control" type="text" name="" id="" placeholder="Digite seu sobrenome">
                    </div>


                    <div class="form-group mb-4">
                        <input class="form-control" type="email" name="" id="" placeholder="Digite seu e-mail">
                    </div>

                    <div class="form-group mb-4">
                        <input class="form-control" type="text" name="" id="" placeholder="Digite seu telefone">
                    </div>

                    <div class="form-group mb-4">
                        <input class="form-control" type="date" name="" id=""
                            placeholder="Digite sua data de nascimento">
                    </div>

                    <div class="form-group mb-4">
                        <input class="form-control" type="text" name="" id="" placeholder="Digite sua endereço">
                    </div>

                    <div class="form-group mb-4">
                        <input class="form-control" type="text" name="" id="" placeholder="Digite sua cidade">
                    </div>


                    <div class="row">
                        <div class="col-12 col-md-6">
                            <div class="form-group mb-4">
                                <input class="form-control" type="text" name="" id="" placeholder="Digite seu estado">
                            </div>
                        </div>
                        <div class="col-12 col-md-6">
                            <div class="form-group mb-4">
                                <input class="form-control" type="text" name="" id="" placeholder="Digite seu CEP">
                            </div>
                        </div>
                    </div>

                    <div class="form-group mb-4">
                        <input class="form-control" type="password" name="" id=""
                            placeholder="Digite sua primeira senha">
                    </div>
                    <div class="form-group mb-4 text-start">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" name="tipo_login" id="tipo_login_medico"
                                value="option1">
                            <label class="form-check-label text-dark" for="tipo_login_medico">
                                Li e concordo com os termos e condições
                            </label>
                        </div>
                    </div>

                    <div class="form-group mb-4">
                        <a href="login.html" class="btn btn-outline-primary w-50">Cadastre-se</a>
                    </div>

                    <div class="form-group">
                        <a href="login.html" class="small text-decoration-none">Já tem uma conta?</a>
                    </div>
                </form>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>


</body>



</html>
